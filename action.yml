name: 'Entire External Agent Protocol Tests'
description: 'Validates protocol compliance of an Entire CLI external agent binary'

inputs:
  binary-path:
    description: 'Path to the pre-built external agent binary (entire-agent-<name>)'
    required: true
  go-version:
    description: 'Go version to use for running tests'
    required: false
    default: 'stable'
  fixtures-path:
    description: 'Optional path to a JSON fixtures file for semantic detect/transcript checks'
    required: false

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: false
    - name: Build test CLI
      shell: bash
      working-directory: ${{ github.action_path }}
      run: go build -o external-agents-tests .
    - name: Run protocol compliance tests
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        BINARY="${{ inputs.binary-path }}"
        if [[ ! "$BINARY" = /* ]]; then
          BINARY="${GITHUB_WORKSPACE}/${BINARY}"
        fi
        FIXTURES="${{ inputs.fixtures-path }}"
        ARGS=("verify" "$BINARY")
        if [[ -n "$FIXTURES" ]]; then
          if [[ ! "$FIXTURES" = /* ]]; then
            FIXTURES="${GITHUB_WORKSPACE}/${FIXTURES}"
          fi
          ARGS+=("--fixtures" "$FIXTURES")
        fi
        ./external-agents-tests "${ARGS[@]}"
